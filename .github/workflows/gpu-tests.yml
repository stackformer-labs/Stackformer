name: GPU Tests (Kaggle)

on:
  pull_request:
  workflow_dispatch:

jobs:
  gpu-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Kaggle CLI
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install kaggle

      - name: Validate and write kaggle.json
        env:
          KAGGLE_JSON: ${{ secrets.KAGGLE_JSON }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          raw = ("""${KAGGLE_JSON}""").strip()
          if not raw:
              raise SystemExit("[gpu-ci] ERROR: KAGGLE_JSON secret is missing.")

          try:
              creds = json.loads(raw)
          except json.JSONDecodeError as exc:
              raise SystemExit(f"[gpu-ci] ERROR: KAGGLE_JSON must be valid single-line JSON: {exc}")

          username = str(creds.get("username", "")).strip()
          key = str(creds.get("key", "")).strip()
          if not username or not key:
              raise SystemExit("[gpu-ci] ERROR: KAGGLE_JSON must include non-empty username and key.")

          kaggle_dir = Path.home() / ".kaggle"
          kaggle_dir.mkdir(parents=True, exist_ok=True)
          target = kaggle_dir / "kaggle.json"
          target.write_text(json.dumps({"username": username, "key": key}), encoding="utf-8")
          target.chmod(0o600)

          print(f"[gpu-ci] Kaggle auth ready for user: {username}")
          PY

      - name: Preflight Kaggle auth
        run: |
          set -euo pipefail
          kaggle config view > /dev/null
          kaggle kernels list --page-size 1 > /dev/null
          echo "[gpu-ci] Kaggle auth + API preflight passed."

      - name: Prepare kernel payload and metadata
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          rm -rf kaggle-kernel kaggle-output
          mkdir -p kaggle-kernel kaggle-output

          cp ci/kaggle/run_gpu_tests.py kaggle-kernel/run_gpu_tests.py

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          creds = json.loads((Path.home() / ".kaggle" / "kaggle.json").read_text(encoding="utf-8"))
          username = creds["username"]
          short_sha = os.environ["GITHUB_SHA"][:7]
          slug = f"stackformer-gpu-{os.environ['GITHUB_RUN_ID']}-{short_sha}"
          kernel_ref = f"{username}/{slug}"

          template = json.loads(Path("ci/kaggle/kernel-metadata.template.json").read_text(encoding="utf-8"))
          template["id"] = kernel_ref
          template["title"] = slug
          Path("kaggle-kernel/kernel-metadata.json").write_text(
              json.dumps(template, indent=2) + "\n",
              encoding="utf-8",
          )

          run_path = Path("kaggle-kernel/run_gpu_tests.py")
          content = run_path.read_text(encoding="utf-8")
          content = content.replace("__STACKFORMER_REPO__", f"https://github.com/{os.environ['GITHUB_REPOSITORY']}.git")
          content = content.replace("__STACKFORMER_REF__", os.environ["GITHUB_SHA"])
          run_path.write_text(content, encoding="utf-8")

          env_path = Path(os.environ["GITHUB_ENV"])
          with env_path.open("a", encoding="utf-8") as f:
              f.write(f"KERNEL_REF={kernel_ref}\n")
              f.write(f"KERNEL_SLUG={slug}\n")

          print(f"[gpu-ci] Prepared kernel: {kernel_ref}")
          print("[gpu-ci] Final kernel-metadata.json:")
          print(Path("kaggle-kernel/kernel-metadata.json").read_text(encoding="utf-8"))
          PY

      - name: Push Kaggle kernel (retry once)
        run: |
          set -euo pipefail
          echo "[gpu-ci] Pushing ${KERNEL_REF}"
          if ! kaggle kernels push -p kaggle-kernel; then
            echo "[gpu-ci] WARN: first push failed; retrying once"
            sleep 5
            kaggle kernels push -p kaggle-kernel
          fi

      - name: Poll run status and fetch output
        env:
          KERNEL_REF: ${{ env.KERNEL_REF }}
        run: |
          set -euo pipefail
          echo "[gpu-ci] Polling ${KERNEL_REF}"

          poll_status() {
            kaggle kernels status "${KERNEL_REF}" 2>&1 || true
          }

          dump_logs() {
            kaggle kernels output "${KERNEL_REF}" -p kaggle-output || true
            if [ -d kaggle-output ]; then
              find kaggle-output -maxdepth 2 -type f -print
              while IFS= read -r file; do
                echo "----- ${file} (first 200 lines) -----"
                sed -n '1,200p' "${file}" || true
              done < <(find kaggle-output -maxdepth 2 -type f)
            fi
          }

          max_attempts=18
          attempt=1
          while [ "$attempt" -le "$max_attempts" ]; do
            raw_status="$(poll_status)"
            status="$(printf '%s' "$raw_status" | tr '[:upper:]' '[:lower:]')"
            echo "[gpu-ci] Attempt ${attempt}/${max_attempts}: ${raw_status}"

            if echo "$status" | grep -Eq "error|failed|cancel"; then
              echo "[gpu-ci] ERROR: kernel failed"
              dump_logs
              exit 1
            fi

            if echo "$status" | grep -q "complete"; then
              echo "[gpu-ci] Kernel completed"
              dump_logs
              exit 0
            fi

            attempt=$((attempt + 1))
            sleep 20
          done

          echo "[gpu-ci] ERROR: timeout while waiting for Kaggle kernel"
          dump_logs
          exit 1
